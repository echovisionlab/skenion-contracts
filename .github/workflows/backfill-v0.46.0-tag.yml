name: Backfill v0.46.0 Tag

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: backfill-v0.46.0-tag
  cancel-in-progress: false

env:
  EXPECTED_REPOSITORY: skenion/skenion-contracts
  LEGACY_REF: refs/tags/skenion-contracts-v0.46.0
  CANONICAL_REF: refs/tags/v0.46.0
  EXPECTED_SHA: 27046033314e3f32018acaf9ff02a4eeea284d06

jobs:
  backfill:
    name: Create canonical tag
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Validate refs and create canonical tag
        shell: bash
        run: |
          python3 <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          expected_repository = os.environ["EXPECTED_REPOSITORY"]
          actual_repository = os.environ.get("GITHUB_REPOSITORY", "")
          api_url = os.environ.get("GITHUB_API_URL", "https://api.github.com")
          token = os.environ.get("GH_TOKEN", "")
          legacy_ref = os.environ["LEGACY_REF"]
          canonical_ref = os.environ["CANONICAL_REF"]
          expected_sha = os.environ["EXPECTED_SHA"]

          def fail(message):
              print(f"::error::{message}", file=sys.stderr)
              sys.exit(1)

          if not token:
              fail("secrets.GH_TOKEN is required")

          if actual_repository != expected_repository:
              fail(f"workflow must run in {expected_repository}, got {actual_repository or '<unset>'}")

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "skenion-contracts-tag-backfill",
          }
          base_url = f"{api_url}/repos/{expected_repository}"

          def api_request(method, path, body=None):
              data = None if body is None else json.dumps(body).encode("utf-8")
              request = urllib.request.Request(
                  f"{base_url}{path}",
                  data=data,
                  headers=headers,
                  method=method,
              )
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      raw = response.read().decode("utf-8")
                      payload = json.loads(raw) if raw else {}
                      return response.status, payload
              except urllib.error.HTTPError as error:
                  raw = error.read().decode("utf-8", errors="replace")
                  try:
                      payload = json.loads(raw) if raw else {}
                  except json.JSONDecodeError:
                      payload = {"message": raw}
                  return error.code, payload
              except urllib.error.URLError as error:
                  fail(f"{method} {path} failed: {error.reason}")

          def ref_api_path(ref):
              prefix = "refs/"
              if not ref.startswith(prefix):
                  fail(f"unsafe ref name {ref}")
              return f"/git/ref/{ref[len(prefix):]}"

          def api_error(method, path, status, payload):
              message = payload.get("message") if isinstance(payload, dict) else None
              detail = f": {message}" if message else ""
              fail(f"{method} {path} returned {status}{detail}")

          def read_ref(ref, *, allow_missing):
              path = ref_api_path(ref)
              status, payload = api_request("GET", path)
              if status == 404 and allow_missing:
                  return None
              if status != 200:
                  api_error("GET", path, status, payload)
              if payload.get("ref") != ref:
                  fail(f"API response ref mismatch for {ref}")
              return payload

          def require_lightweight_commit_ref(ref, payload):
              ref_object = payload.get("object") or {}
              object_type = ref_object.get("type")
              object_sha = ref_object.get("sha")
              if object_type != "commit":
                  fail(f"{ref} must be a lightweight commit ref, got {object_type or '<missing>'}")
              if object_sha != expected_sha:
                  fail(f"{ref} resolves to {object_sha or '<missing>'}, expected {expected_sha}")

          legacy = read_ref(legacy_ref, allow_missing=False)
          require_lightweight_commit_ref(legacy_ref, legacy)

          canonical = read_ref(canonical_ref, allow_missing=True)
          if canonical is not None:
              require_lightweight_commit_ref(canonical_ref, canonical)
              print(f"{canonical_ref} already exists at {expected_sha}")
              sys.exit(0)

          status, payload = api_request(
              "POST",
              "/git/refs",
              {"ref": canonical_ref, "sha": expected_sha},
          )
          if status != 201:
              api_error("POST", "/git/refs", status, payload)

          require_lightweight_commit_ref(canonical_ref, payload)
          print(f"Created {canonical_ref} at {expected_sha}")
          PY
