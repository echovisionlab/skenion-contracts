name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.46.0
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - id: tag
        shell: bash
        run: |
          tag="${RELEASE_TAG}"
          if [[ ! "${tag}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "release tag ${tag} must be canonical vX.Y.Z" >&2
            exit 1
          fi

          version="${tag#v}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  npm:
    name: npm
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-tag.outputs.tag }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @skenion/contracts run build
      - id: package
        run: |
          version="$(node -p "require('./packages/ts/package.json').version")"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
      - run: |
          expected="${{ needs.validate-tag.outputs.version }}"
          actual="${{ steps.package.outputs.version }}"
          if [[ "${actual}" != "${expected}" ]]; then
            echo "npm package version ${actual} does not match release tag v${expected}" >&2
            exit 1
          fi
      - id: registry
        run: |
          if npm view "@skenion/contracts@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi
      - if: steps.registry.outputs.published != 'true'
        run: npm publish --access public --provenance
        working-directory: packages/ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  crates:
    name: crates.io
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-tag.outputs.tag }}
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: skenion-contracts-publish-rust
          workspaces: packages/rust -> target
          cache-all-crates: "true"
      - id: package
        run: |
          version="$(cargo metadata --manifest-path packages/rust/Cargo.toml --locked --no-deps --format-version 1 | python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
      - run: |
          expected="${{ needs.validate-tag.outputs.version }}"
          actual="${{ steps.package.outputs.version }}"
          if [[ "${actual}" != "${expected}" ]]; then
            echo "Rust crate version ${actual} does not match release tag v${expected}" >&2
            exit 1
          fi
      - id: registry
        run: |
          if curl --fail --silent "https://crates.io/api/v1/crates/skenion-contracts/${{ steps.package.outputs.version }}" >/dev/null; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi
      - if: steps.registry.outputs.published != 'true'
        run: test -n "${CARGO_REGISTRY_TOKEN}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: cargo package --manifest-path packages/rust/Cargo.toml --locked
      - if: steps.registry.outputs.published != 'true'
        run: cargo publish --manifest-path packages/rust/Cargo.toml --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
